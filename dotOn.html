<!DOCTYPE html>
<html>
<body>
    <canvas id="myCanvas" width="600" height="600" style="border:1px solid #d3d3d3;"></canvas>

    <script>
        const canvas = document.getElementById("myCanvas");
        const ctx = canvas.getContext("2d");

        // Çember özellikleri
        const centerX = 300;
        const centerY = 300;
        const radius = 150;

        // Hareketli noktanın başlangıç açısı (radyan cinsinden)
        let angle = 0;

        function draw() {
            // Ekranı temizle
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Ana Çemberi Çiz
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = "#bdc3c7";
            ctx.lineWidth = 2;
            ctx.stroke();

            // 2. Çember Üzerindeki Noktanın Konumunu Hesapla
            const pointX = centerX + radius * Math.cos(angle);
            const pointY = centerY + radius * Math.sin(angle);

            // 3. Noktayı Çiz
            ctx.beginPath();
            ctx.arc(pointX, pointY, 10, 0, 2 * Math.PI);
            ctx.fillStyle = "#e74c3c";
            ctx.fill();
            ctx.strokeStyle = "white";
            ctx.stroke();
        }

        canvas.addEventListener('mousemove', (event) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;

            // Mouse ile merkez arasındaki açıyı hesapla (atan2 çok kritiktir)
            angle = Math.atan2(mouseY - centerY, mouseX - centerX);

            // Ekranı güncelle
            draw();
        });

        // İlk çizim
        draw();
    </script>
</body>
</html>
