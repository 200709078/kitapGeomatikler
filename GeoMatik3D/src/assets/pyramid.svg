    <circle cx="35" cy="46" r="1.58" fill="none" stroke="#2f2f2f" stroke-width="0.32" opacity="0.6" />
    <ellipse cx="34.4" cy="45.3" rx="0.68" ry="0.5" fill="url(#pyramidPointLight)" transform="rotate(-22 34.4 45.3)" />
