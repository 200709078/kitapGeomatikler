    <circle cx="32" cy="9" r="1.82" fill="none" stroke="#2f0038" stroke-width="0.35" opacity="0.65" />
    <ellipse cx="31.3" cy="8.2" rx="0.78" ry="0.58" fill="url(#pyramidPointLight)" transform="rotate(-22 31.3 8.2)" />

