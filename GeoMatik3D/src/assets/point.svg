  </defs>

  <circle cx="32" cy="32" r="15" fill="url(#pointBody)" filter="url(#softShadow)"/>
  <circle cx="32" cy="32" r="14" fill="none" stroke="#004ebf" stroke-width="1.5" opacity="0.55"/>
  <ellipse cx="24" cy="22" rx="6.5" ry="4.5" fill="url(#pointLight)" transform="rotate(-22 24 22)"/>
