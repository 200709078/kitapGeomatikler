<?xml version="1.0" encoding="UTF-8"?>
<svg
  viewBox="0 0 64 64"
  width="100%"
  height="100%"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="Koni"
>
  <defs>
    <!-- Koni yüzeyi -->
    <linearGradient id="coneFill" x1="20%" y1="10%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#9a6848" stop-opacity="0.92" />
      <stop offset="100%" stop-color="#7f5238" stop-opacity="0.92" />
    </linearGradient>

    <!-- Taban dolgusu -->
    <linearGradient id="baseFill" x1="20%" y1="20%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#9b6848" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#7c5037" stop-opacity="0.9" />
    </linearGradient>

    <!-- Mavi nokta -->
    <radialGradient id="bluePointBody" cx="32%" cy="26%" r="68%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="16%" stop-color="#9dccff" />
      <stop offset="42%" stop-color="#1f7aff" />
      <stop offset="72%" stop-color="#0066ff" />
      <stop offset="100%" stop-color="#003f9e" />
    </radialGradient>

    <!-- Mor nokta -->
    <radialGradient id="purplePointBody" cx="32%" cy="26%" r="68%">
      <stop offset="0%" stop-color="#d59be6" />
      <stop offset="20%" stop-color="#9a1bc0" />
      <stop offset="75%" stop-color="#6b007b" />
      <stop offset="100%" stop-color="#43004d" />
    </radialGradient>

    <!-- Gri nokta -->
    <radialGradient id="grayPointBody" cx="32%" cy="26%" r="68%">
      <stop offset="0%" stop-color="#8e95a3" />
      <stop offset="45%" stop-color="#4b5563" />
      <stop offset="100%" stop-color="#2f3b49" />
    </radialGradient>
  </defs>

  <!-- Koni yan yüzeyi -->
  <path
    d="M 32 6
       L 9 50
       A 23 8 0 0 1 55 50
       Z"
    fill="url(#coneFill)"
    stroke="none"
  />

  <!-- Taban diski -->
  <ellipse
    cx="32"
    cy="50"
    rx="23"
    ry="8"
    fill="url(#baseFill)"
    opacity="0.9"
  />

  <!-- Koni dış ayrıtları -->
  <g
    fill="none"
    stroke="#111827"
    stroke-width="1"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <line x1="32" y1="6" x2="9" y2="50" />
    <line x1="32" y1="6" x2="55" y2="50" />
  </g>

  <!-- Taban elipsi -->
  <ellipse
    cx="32"
    cy="50"
    rx="23"
    ry="8"
    fill="none"
    stroke="#111827"
    stroke-width="1"
  />

  <!-- Tabanın arka yayı / iç çizgi hissi -->
  <path
    d="M 9 50
       A 23 8 0 0 1 55 50"
    fill="none"
    stroke="#111827"
    stroke-width="0.75"
    opacity="0.55"
  />

  <!-- Yükseklik: tepe noktasından taban merkezine -->
  <line
    x1="32"
    y1="6"
    x2="32"
    y2="47"
    stroke="#7a1978"
    stroke-width="0.8"
    stroke-dasharray="2 1.8"
    stroke-linecap="round"
    opacity="0.9"
  />

  <!-- Yarıçap -->
  <line
    x1="32"
    y1="47"
    x2="55"
    y2="50"
    stroke="#5b351b"
    stroke-width="1.8"
    stroke-linecap="round"
  />

  <!-- Tepe mor nokta -->
  <circle
    cx="32"
    cy="6"
    r="1.7"
    fill="url(#purplePointBody)"
    stroke="#32003a"
    stroke-width="0.35"
  />

  <!-- Merkez gri nokta -->
  <circle
    cx="32"
    cy="47"
    r="1.35"
    fill="url(#grayPointBody)"
    stroke="#2f3b49"
    stroke-width="0.35"
  />

  <!-- Yarıçap uç mavi nokta -->
  <circle
    cx="55"
    cy="50"
    r="1.65"
    fill="url(#bluePointBody)"
    stroke="#00358f"
    stroke-width="0.35"
  />
</svg>