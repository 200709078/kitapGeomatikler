<?xml version="1.0" encoding="UTF-8"?>
<svg
  viewBox="0 0 64 64"
  width="100%"
  height="100%"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="Silindir"
>
  <defs>
    <!-- Gövde -->
    <linearGradient id="cylFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a735a" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#746047" stop-opacity="0.95" />
    </linearGradient>

    <!-- Mavi nokta -->
    <radialGradient id="bluePointBody" cx="32%" cy="26%" r="68%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="16%" stop-color="#9dccff" />
      <stop offset="42%" stop-color="#1f7aff" />
      <stop offset="72%" stop-color="#0066ff" />
      <stop offset="100%" stop-color="#003f9e" />
    </radialGradient>

    <!-- Mor nokta -->
    <radialGradient id="purplePointBody" cx="32%" cy="26%" r="68%">
      <stop offset="0%" stop-color="#d59be6" />
      <stop offset="20%" stop-color="#9a1bc0" />
      <stop offset="75%" stop-color="#6b007b" />
      <stop offset="100%" stop-color="#43004d" />
    </radialGradient>

    <!-- Gri nokta -->
    <radialGradient id="grayPointBody" cx="32%" cy="26%" r="68%">
      <stop offset="0%" stop-color="#8e95a3" />
      <stop offset="45%" stop-color="#4b5563" />
      <stop offset="100%" stop-color="#2f3b49" />
    </radialGradient>
  </defs>

  <!-- Yan yüzey -->
  <path
    d="M 10 12
       A 22 6 0 0 1 54 12
       L 58 46
       A 18 7 0 0 0 22 46
       Z"
    fill="url(#cylFill)"
    stroke="none"
  />

  <!-- Üst taban dış sınırı -->
  <ellipse
    cx="32"
    cy="12"
    rx="22"
    ry="6"
    fill="none"
    stroke="#111827"
    stroke-width="1"
  />

  <!-- Alt tabanın görünen ön yayı -->
  <path
    d="M 22 46
       A 18 7 0 0 0 58 46"
    fill="none"
    stroke="#111827"
    stroke-width="1"
    stroke-linecap="round"
  />

  <!-- Yan ayrıtlar -->
  <line
    x1="10"
    y1="12"
    x2="22"
    y2="46"
    stroke="#111827"
    stroke-width="1"
    stroke-linecap="round"
  />
  <line
    x1="54"
    y1="12"
    x2="58"
    y2="46"
    stroke="#111827"
    stroke-width="1"
    stroke-linecap="round"
  />

  <!-- Alt tabandaki yarıçap -->
  <line
    x1="41"
    y1="45"
    x2="56"
    y2="48"
    stroke="#374151"
    stroke-width="1.6"
    stroke-linecap="round"
  />

  <!-- Üst tabandaki yarıçap -->
  <line
    x1="34"
    y1="8"
    x2="47"
    y2="11"
    stroke="#5b3a1f"
    stroke-width="1.4"
    stroke-linecap="round"
  />

  <!-- Eksen / yükseklik -->
  <line
    x1="34"
    y1="8"
    x2="41"
    y2="45"
    stroke="#8a187f"
    stroke-width="0.8"
    stroke-dasharray="2 1.8"
    stroke-linecap="round"
    opacity="0.9"
  />

  <!-- Alt merkez gri nokta -->
  <circle
    cx="41"
    cy="45"
    r="1.45"
    fill="url(#grayPointBody)"
    stroke="#2f3b49"
    stroke-width="0.35"
  />

  <!-- Alt uç mavi nokta -->
  <circle
    cx="56"
    cy="48"
    r="1.65"
    fill="url(#bluePointBody)"
    stroke="#00358f"
    stroke-width="0.35"
  />

  <!-- Üst merkez mor nokta -->
  <circle
    cx="34"
    cy="8"
    r="1.65"
    fill="url(#purplePointBody)"
    stroke="#32003a"
    stroke-width="0.35"
  />
</svg>