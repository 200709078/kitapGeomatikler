<?xml version="1.0" encoding="utf-8"?>
<svg
  viewBox="0 0 64 64"
  width="100%"
  height="100%"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="Açı"
>
  <defs>
    <radialGradient id="linePointBody" cx="32%" cy="26%" r="68%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="16%" stop-color="#9dccff" />
      <stop offset="42%" stop-color="#1f7aff" />
      <stop offset="72%" stop-color="#0066ff" />
      <stop offset="100%" stop-color="#003f9e" />
    </radialGradient>

    <radialGradient id="linePointLight" cx="35%" cy="30%" r="32%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>

    <filter id="linePointShadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow
        dx="1"
        dy="1.4"
        stdDeviation="1.1"
        flood-color="#000000"
        flood-opacity="0.35"
      />
    </filter>
  </defs>

  <!-- Açı yayı -->
  <path
    d="M 37 44 A 17 17 0 0 0 32.02 31.98"
    fill="none"
    stroke="#ff0000"
    stroke-width="4.2"
    stroke-linecap="round"
  />

  <!-- Doğru 1 -->
  <line
    x1="20"
    y1="44"
    x2="56"
    y2="8"
    stroke="#111827"
    stroke-width="4"
    stroke-linecap="round"
  />

  <!-- Doğru 2 -->
  <line
    x1="20"
    y1="44"
    x2="70"
    y2="44"
    stroke="#111827"
    stroke-width="4"
    stroke-linecap="round"
  />

  <!-- Köşe noktası -->
  <g filter="url(#linePointShadow)">
    <circle
      cx="20"
      cy="44"
      r="6.4"
      fill="url(#linePointBody)"
    />
    <circle
      cx="20"
      cy="44"
      r="6"
      fill="none"
      stroke="#004ebf"
      stroke-width="0.65"
      opacity="0.55"
    />
    <ellipse
      cx="17.8"
      cy="41.5"
      rx="2.5"
      ry="1.9"
      fill="url(#linePointLight)"
      transform="rotate(-22 17.8 41.5)"
    />
  </g>
</svg>