    <line x1="32" y1="32" x2="45.5" y2="19" stroke="#111827" stroke-width="1.35" stroke-linecap="round" stroke-dasharray="3 2.3" opacity="0.78" />
    <ellipse cx="23.5" cy="21.5" rx="7.5" ry="5.4" fill="url(#sphereHighlight)" transform="rotate(-22 23.5 21.5)" />
    <circle cx="32" cy="32" r="3.2" fill="url(#sphereCenterPointBody)" stroke="#1f2937" stroke-width="0.85" />
    <circle cx="45.5" cy="19" r="3.35" fill="url(#sphereBluePointBody)" stroke="#00358f" stroke-width="0.85" />
