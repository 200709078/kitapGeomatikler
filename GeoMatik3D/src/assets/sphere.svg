<?xml version="1.0" encoding="UTF-8"?>
<svg
  viewBox="0 0 64 64"
  width="100%"
  height="100%"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="Daire / Disk"
>
  <defs>
    <!-- Düzlemsel disk dolgusu -->
    <linearGradient id="diskFill" x1="20%" y1="15%" x2="85%" y2="90%">
      <stop offset="0%" stop-color="#aaa68a" />
      <stop offset="55%" stop-color="#8d8968" />
      <stop offset="100%" stop-color="#76734f" />
    </linearGradient>

    <!-- Mavi 3D nokta -->
    <radialGradient id="bluePointBody" cx="32%" cy="26%" r="68%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="16%" stop-color="#9dccff" />
      <stop offset="42%" stop-color="#1f7aff" />
      <stop offset="72%" stop-color="#0066ff" />
      <stop offset="100%" stop-color="#003f9e" />
    </radialGradient>

    <!-- Merkez nokta -->
    <radialGradient id="centerPointBody" cx="32%" cy="26%" r="68%">
      <stop offset="0%" stop-color="#b7c8d8" />
      <stop offset="45%" stop-color="#5e7180" />
      <stop offset="100%" stop-color="#34424c" />
    </radialGradient>
  </defs>

  <!-- Disk / düzlem -->
  <ellipse
    cx="32"
    cy="32"
    rx="27"
    ry="18.5"
    fill="url(#diskFill)"
    opacity="0.82"
    transform="rotate(-7 32 32)"
  />

  <!-- Yarıçap / doğru parçası -->
  <line
    x1="34"
    y1="31"
    x2="50"
    y2="38"
    stroke="#4b2b12"
    stroke-width="2.1"
    stroke-linecap="round"
  />

  <!-- Merkez noktası -->
  <circle
    cx="34"
    cy="31"
    r="3.55"
    fill="url(#centerPointBody)"
    stroke="#2f3a42"
    stroke-width="1.45"
  />

  <!-- Uç noktası -->
  <circle
    cx="50"
    cy="38"
    r="3.85"
    fill="url(#bluePointBody)"
    stroke="#00358f"
    stroke-width="2.45"
  />
</svg>