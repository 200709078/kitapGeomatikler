<?xml version="1.0" encoding="UTF-8"?>
<svg
  viewBox="0 0 64 64"
  width="100%"
  height="100%"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="Küre"
>
  <defs>
    <radialGradient id="sphereFill" cx="30%" cy="24%" r="72%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="18%" stop-color="#dbeafe" />
      <stop offset="52%" stop-color="#60a5fa" />
      <stop offset="82%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </radialGradient>
    <radialGradient id="sphereHighlight" cx="35%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="sphereBluePointBody" cx="32%" cy="26%" r="68%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="16%" stop-color="#9dccff" />
      <stop offset="42%" stop-color="#1f7aff" />
      <stop offset="72%" stop-color="#0066ff" />
      <stop offset="100%" stop-color="#003f9e" />
    </radialGradient>
    <radialGradient id="sphereCenterPointBody" cx="32%" cy="26%" r="68%">
